body:
  text: 籀史目錄類二金石之屬提要臣等謹案籀史一卷宋翟耆年撰耆年字伯壽參政公巽之子别號黄鶴山人是書首載宣和博古圖有紹興十有二年二月帝命臣耆年云云葢南宋初所作本上下二卷嵗久散佚惟嘉興曺溶家尚有鈔本然已僅存上卷今藏弆家所著錄皆自曺本傳寫者也王士禎嘗載其目于居易錄欲以訪求其下卷卒未之獲知無完本久矣其以籀名史特因所載多金石欵識篆𨽻之體為多實非専述籀文所錄各種之後皆附論説括其梗概于岐陽石鼓不深信為史籀之作與唐代所傳特異亦各存所見然未至如馬定國定為宇文周所作也所録不及薛尚功鐘鼎彛器欵識備載篆文而所述源委則較薛為詳二書相輔而行固未可以偏廢其中所云趙明誠古器物銘碑十五巻稱商器三巻周器十卷秦漢器二巻據其所説則十五巻皆古器物銘而無石刻當于金石錄之外别為一書而士禎以為即金石錄者其説殊誤豈士禎偶未撿金石錄歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3816496a0a4ccda42da96bea8d8c8f14533c28811bf3054e3a8bdfcef1a253e4
