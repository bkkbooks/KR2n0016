body:
  text: 籀史目録類二金石之屬提要臣等謹案籀史一卷宋翟耆年撰耆年字伯壽參政公巽之子别號黃鶴山人是書首載宣和博古圖有紹興十有二年二月帝命臣耆年云云蓋南宋初所作本上下二卷嵗久散佚惟嘉興曺溶家尚有鈔本然已僅存上卷今藏弆家所著録皆自曺本傳寫者也王士禎嘗載其目于居易録欲以訪求其下卷卒未之獲知無完本久矣其以籀名史特因所載多金石欵識篆𨽻之體為多實非専述籀文所録各種之後皆附論說括其梗概于岐陽石鼓不深信為史籀之作與唐代所傳特異亦各存所見然未至如馬定國定為宇文周所作也所録不及薛尚功鐘鼎彛器欵識備載篆文而所述源委則較薛為詳二書相輔而行固未可以偏廢其中所云趙明誠古器物銘碑十五卷稱商器三卷周器十卷秦漢器二卷據其所說則十五卷皆古器物銘而無石刻當于金石録之外别為一書而士禎以為即金石録者其說殊誤豈士禎偶未撿金石録歟乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f09ff5e4ebaf920043f3677524e74eac60caff88e3ca1bd728ef3fdb1f9772dd
