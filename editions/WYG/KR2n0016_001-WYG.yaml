body:
  text: 籀史宋翟耆年撰徽宗聖文仁徳顯孝皇帝宣和博古圖三十巻帝文武生知聖神天縱酷好三代鐘鼎書集羣臣家所蓄舊器萃之天府選通籕學之士䇿名禮局追跡古文親御翰墨討論訓釋以成此書使後世之士識鼎彛犧象之制瑚璉尊罍之美發明禮器之所以為用與六經相表裏以敷遺後學可謂丕顯文王之謨也惟紹興十有二年二月帝命臣耆年紀寶十有二帝曰若昔保氏以六書詔國子其後官弗修方罔知習于訓古今汝追跡古文博極篆籀俾栒鼎悝銘弗斁是賴肆余命汝仿商戈之書著兹重器錫汝先帝博古訓象圭暨筆墨若茶藥物為旅臣惟不類不足以膺受帝祉敢拜稽首對揚天子丕顯休命用祈眉夀獲畀子孫寶傳于永世徽宗皇帝祀圜丘方澤太廟明堂禮器窽識三卷政和癸巳帝獲周罍於鎬京秋獲商卣獲兕敦于長安又獲黃目尊于浚都郊特牲所謂黃目鬱器之上尊者黄目周人所造故以薦鬯為六尊之冠六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒脩酌灌用鬱齊朝用醴齊饋用盎齊獻之正也鬱者煑鬱金以和鬯酒取其芳香以獻神故謂之鬱鬯禮記所謂鬱合鬯臭陰達于淵泉是也不以鬱合則直謂之鬯古者天子用圭瓚以薦鬯諸侯用璋瓚以薦薰諸侯賜圭瓚然後為鬯未賜圭瓚則資鬯於天子鬯者以黒黍為酒釀以鬯草故曰鬯又曰稱鬯者取一稃二米和氣所生為酒以其芬芳條暢故曰鬯三代之祭各用其當代之尊彛為灌明堂位所謂灌尊夏后氏以蜼彛殷以斝音稼周以黄目是也成王以周公有勲勞於天下命魯公世世祀周公以天子之禮樂其樂也兼用四代之服器故魯鬱尊亦用黄目然魯於賔祭惟得用周禘祭之樂備八佾之舞不得用祫祭之樂周之祫也兼用六代之樂聲帝嚳英䪫之器舞雲門咸池大韶大夏大濩大武其禘也正用四代之樂至韶箾而止故春秋傳曰魯有禘樂賔祭用之宗周之時不以黄目為鬱尊者獨杞宋之君盖王者之興必存二王之後以偹三恪所以示尊賢而不臣也使不失舊物自用其先世之禮樂行其先世之王朔以郊天以祭其始祖受命之王各用其牲樂服其衮冕行九獻之禮以祭宗廟九獻之禮王后祼各一朝踐各一饋獻各一酌尸各一共八獻諸臣酳尸一是為九獻九獻之外又有衆賔加獻雖夫人助祭於王亦服本國之盛服其祭也杞則先迎牲承血薦於室以降神然後酌鳥彛之鬱灌鬯以獻尸祭用昬牲用黒尊用山罍舞大夏宋則先奏樂三闋以降神酌斝彛之鬱灌鬯以獻尸然後迎牲祭用日中牲尚白尊用著尊舞大濩獻尸之爵杞用醆宋用斝周用爵魯用六代禮而獻尸以斝者避天子也祭有朝踐有朝獻享禮祼畢以籩豆薦血牲于尸謂之朝踐既薦王以瑶爵酌之字從酉從勺少飲也年晉切然後饋熟食謂之朝獻朝踐象朝事其親所進饋食象食時所進朝踐之豆籩當饗饋食之豆籩當食禮莫重於饗食次之燕又次之大祭則兼用先代之樂時祭則止自用先世之樂而已豈特使自用於其國雖朝見於天子亦以所尚之色以自殊所服之服以自著如髙陽之後朝舜薦玉而色尚繒殷士助祭于周而服黼冔豈特許其自殊自異而已武王之封微子也賜之册命至戒之使修其禮物統承先王率由舊典𢎞乃烈祖是也後復幽燕獲耶律徳光所盜上古寶玉尊形製與黄目尊等瑩然無少玷缺在廷莫知所用帝獨識其為灌尊實周人之重寶詔禮官圜丘祭天之器仿古盡用吉玉然後知古人之祀不特止於玉几玉爵玉豆也明堂位夏后氏以琖夏之四璉商之六瑚皆玉也周禮典瑞至以琮璧六器為贈玉斂尸盖三代無所不用玉以玉者至陽之精温潤旁達所以致潔以交神明則其為器以祀也宜矣叔世狹陋儀不及物士夫鄙野識同流俗不知聖人事天至嚴貴玉盡美之義苟獲寶玉罔知奉天之用至為篚實以賂貴達以于爵位以資玩好故寶自珍不顯其光甘自泯沒為盜竊婦玩吁可歎也向非聖主知為重器㧞於俘獲之餘薦之天地神祇則三代重器無復自伸矣明年獲周錞越三月甲子獲寶簋帝承天休憲三代稽古象物昭徳于彛器凡祀圜丘祭方澤享太室及禰宫諸器命我先人典司制作肇新宗器匹休商周銘功以薦神祗祖考罔有弗格於是一洗漢唐諸儒臆說之陋萬世而下始識三代尊彛之制使六經所載不為空言恭惟徽宗皇帝聖明述作之盛一時文物比隆三代可謂韶盡美矣又盡善也徽宗皇帝政和四年夏祭方澤禮器窽識一卷刻曰政和甲午五月庚午十有二日丙戌帝以夏日之至祇事于方澤作牛鼎用享萬世有休簠簋之識曰政和甲午帝以五月庚午十有二日丙戌肇祭于方澤制器尚象作簋以格明祗萬世永賴犧象鼎彛尊罍壺豆凡二十有八窽器則惟旅比干墓銅槃記開元四年游子武于偃師卜築㙭地獲比干墓銅槃一廣四尺六寸有科斗字十有六毎字長八寸許文曰右林左泉後崗前道萬世之銘兹焉是寶唐人摹字刋石載所得之因云地左右前後崗道與泉並存惟剗夷矣楊隠甫窽石以識其末書學虞監字極勁媚殊可喜也周穆王東巡題名一卷石周穆王東巡題字云周受命一百四十九年余因東巡稅于兹石唐協律郎孟翔記云賈人於海洲得之以為矴石監察御史王澹遊金陵見之取置龍興寺後刺史房孺移入州治余於晏溥慧開家得其摹本石今不知所在周自武王十一年十一月戊午革商受命在位七年成王在位四十七年康王在位二十六年昭王在位五十一年武成康昭四世共一百二十一年今云一百四十九者穆王在位五十五年東巡時即政盖十八年矣周宣王吉日碑一巻右周宣王吉日癸巳碑真三代竒古之書行筆簡易嚴正筆已盡而意有餘無側裂作為之狀大率三代籕畫有自然簡逺之意叔世作篆務竒而貴巧至於竒巧則流於礦澁矣漢晉草𨽻尤尚簡逺况籕畫哉石鼓碑一巻右石鼓碑唐張彦逺法書録載處士張懷瓘書斷叙籕文周太史史籕作其跡有石鼓文存焉又古跡記云史籕石鼓文不知徐浩何據也懷瓘本名懷素開元二十二年勅改名懷瓘浩肅宗時由襄州刺史召授中書舍人兼尚書右丞四方詔令多出浩手遣辭贍敏而書尤精帝喜之寵絶一時世評其書如怒猊抉石渇驥奔泉云進國子祭酒為李輔國譖貶廬州長史代宗復以中書舎人召遷工部侍郎出為嶺南節度使復召拜吏部侍郎與薛邕分典選浩有妾弟冒優託邕擬長安尉御史大夫李栖筠劾之帝怒黜浩明州别駕徳宗立召授彭王傅進㑹稽郡公卒年八十贈太子少師韋左司應物歌云周宣大獵岐之陽刻石表功煒煌煌石如鼔形數止十風雨缺剥苔蘚澁飛喘逶迤相糺錯乃是宣王之臣史籀作應物天寶時扈從游幸疑嘗為三衛蔡質漢宫典儀載三署郎朝賀見天子不持板執袖拜酬鄭户曹驪山感懷云我念綺襦嵗扈從當太平小臣職前驅馳道出灞亭與李録事詩云與君十五侍皇闈曉拂爐烟上赤墀花開漢苑經過處雪下驪山沐浴時近臣零落今猶在仙駕飄颻不可期此日相逢思舊日一杯成喜亦成悲又逢楊開府云少事武皇帝無賴恃恩私身作里中横家藏亡命兒朝持摴蒱局暮竊東鄰姬司𨽻不敢捕立在白玉墀驪山風雪夜長楊羽獵時一字都不識飲酒肆頑癡武皇升仙去憔悴被人欺讀書事已晚把筆學題詩兩府始收跡南宫謬見推非才果不容出守撫􅑱嫠忽逢楊開府論舊涕俱垂坐客何由識惟有故人知永泰中任洛陽丞京兆府功曹建中二年除比部員外郎出為滁州刺史後刺江州追赴闕除左司郎中貞元初厯蘇州刺史李肇國史補云應物為性髙潔鮮食寡欲所居焚香掃地而坐其為詩馳驟建安已還各得風韵又云開元以後位卑而著名者李北海王江寧李館陶鄭廣文元魯山蕭功曹張長史獨孤常州崔比部梁補闕韋蘇州白樂天答劉禹錫詩云敢有文章替左司而官稱止耳豈非遂止於蘇耶應物周逍遥公夐之後左僕射扶陽公待價生司門郎中令儀令儀生鑾鑾生應物應物生監察御史河東節度掌書記慶復韓退之又從而作歌云周綱陵遲四海沸宣王憤起揮天戈鐫功勒成告萬世鑿石作鼔隳嵯峨辭嚴義宻讀難曉如此至寶存豈多豈亦以浩為證乎愈八世祖茂仕後魏以武功顯為尚書人號安定桓王次子金部尚書均生雅州刺史晙晙生曹州司馬仁泰仁泰生桂州長史叡善化行於江漢之間叡四子仲卿少卿雲卿紳卿愈仲卿幼子也仲卿贈尚書左僕射大厯戊申嵗生三嵗而孤七嵗知讀書十三能文貞元初始至京師舉進士八年登第年二十五矣又中博學宏辭科累仕至憲宗元和十一年遷中書舎人宰相惡之改為太子右庶子十二年秋裴度討蔡賊吳元濟奏愈為行軍司馬兼御史中丞遷刑部侍郎帝迎佛於鳯翔愈疏諌貶潮州穆宗即位以國子祭酒召還朝遷兵部侍郎長慶元年成徳軍亂詔愈宣撫還為吏部侍郎初元稹為宰相欲引牛僧孺輔政懼中書舎人李紳沮解乃以紳為御史中丞顧其氣剛愎易疵而韓愈勁直乃以愈為京兆尹兼御史大夫免臺參以激紳紳愈果不相下更持臺府故事論詰紛然繇是皆罷之以紳為江西觀察使遷愈兵部數日復為吏部四年十二月二日卒于位歐陽公云言與雅頌同字古而有法非史籕不能作言固同矣但篆畫行筆當行於所當行止於所當止今位置窘澁促長引短務欲取稱如栁帛君庶字是也意已盡而筆尚行如以可字是也十鼓略相類姑舉一隅識者當自神悟以器窽惟字參鼓刻惟何惟鯉之惟則曉然可見矣蓋字畫無三代醇古之氣吾是以云前輩尚疑繫辭非夫子所作僕於此書直謂非史籀跡也先聖篆延陵季子墓碑一卷子貢曰夫子之文章可得而聞也又曰夫子之墻數仞不得其門而入揚雄曰書心畫也言心聲也聲畫形君子小人見矣夫子之書天縱之聖忠恕之道著於筆畫之間後之君子雖不得親見夫子聞其音聲緒言窺見聖之遺跡得以心悟黙識篤事親守身之大本務道徳仁義以修身則此書與六經固為垂世立教之文豈特金鈎玉畫為三代竒古之書以貴於世哉東坡居士曰呉子夀夢卒延州來季子以讓國聞於諸侯當已冠矣其觀樂于魯知列國之廢興於百年之前其救陳也去呉之亡十三年耳謂季子不前知可乎時季子去夀夢卒盖七十七年矣尚能千里將兵何夀而康也子胥之死季子終無一言於夫差知吳之必亡言之無益也季子盖委脫而去能終不亡者且謂帥師救陳不戰而去以為敵國名則少專矣翟耆年曰左傳魯哀公十年楚子期伐陳吳延州來季子救陳謂子期曰二君不務徳而力争諸侯民何罪焉我請退以為子名姑務徳而安民乃還季子之賢其仁之著莫大於是不使無辜之民横死欲使二國之君務徳以乂民非仁之大孰能至此而曰少專過矣夫子所謂嗚呼者盖歎季子之賢而深與之辭如曰季子來歸喜之辭耳碑唐張從紳識曰夫子篆季札之墓凡十字歴代綿逺其文殘缺開元中𤣥宗敇殷仲容模搨其本大歴十四年潤州刺史蕭定重刻于石建中元年八月仲秋令盧國始建堂遷樹徐鉉古鉦銘碑一卷叙云建陽有越王餘城城臨建溪村人於谿中獲一器狀如鐘長八寸徑六寸柄一尺柄端有雙角相向箝重十斤銘四十八字獻之刺史王延政有摹其字以示余者惟連鉦二字可識上有真字黑印云江南書開寶九年五月敇送史館卷末有史館卬識右刻之首題曰篆鉉字鼎臣江南人從李煜歸朝為銀青光禄大夫右散騎常侍雍熈三年春詔同著作佐郎直史館句中正取許慎說文詳篆籀之跡垂憲久逺鉉言振發人文興崇古道考遺編於魯壁緝蠧簡於羽陵非文字之義今奉明詔俾専是正盖篆書湮替為日巳久錯亂悞謬不可盡究今務援古以正今不敢狥今而違古書上宣付史館命國子監摸板以授學者鉉篆迹殊絶晚年作􅝻音呼鼃切物不正也匾篆毎筆墨跡當畫中非用筆極正不能爾弟鍇字楚金博學嚴正與鉉同有大名於江左鍇著質論十卷後主題其首美之後主文集復命鍇為序君臣上下互相賁飾儒者榮之鉉命鍇取許慎書并已所補訓次以聲韻作解字韻譜十卷太平興國中李煜薨詔侍臣撰煜神道碑有與鉉争名欲中傷者奏曰知吳王事莫若徐鉉為詳遂詔鉉撰鉉請對而泣曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗始悟讓者之意許之鉉但推言厯數有盡天命有歸而已其警句云東隣搆禍南箕扇疑投杼致慈親之惑乞火無里婦之詞始勞因壘之師終後塗山之㑹又有偃王仁義之比太宗覽之稱歎不已異日復得鉉所撰吳王挽詞尤加歎賞毎對宰臣稱鉉之忠義吳王挽詞三篇今傳者二首其一曰儵忽千齡盡冥茫萬事空青松洛陽陌荒草建康宫道徳遺文在興衰自古同受恩無補報反袂泣途窮其二曰上徳承餘烈江南廣舊恩一朝人事變千古信書存哀挽周原道銘旌鄭國門此生雖未死寂寞已消魂鉉被詔撰江南録故有信書之句東隣謂錢俶也掌武太原公言先太師薨弔者朱紫盈門惟鉉獨擕麻袍角帶於客次易服而入鉉盛寒入朝未嘗衣毛衫或詰之曰豈有儒者於闕下戎服歟掌武太原公王文正公旦也旦真宗朝為太尉既致仕人呼為掌武盖唐人謂太尉為掌武云皇祐三館古器圖皇祐三年詔出祕閣及太常所藏三代鐘鼎器付修太樂所參較齊量又詔墨器窽以賜宰執丞相平陽公命承奉郎知國子監書學楊元明南仲釋其文楊叙云漢孝武世去周秦方百餘年魯壁古文已無知者美陽得鼎時謂宜薦宗廟獨張敞識其刻書知為周所賜大臣者今距漢且千年其傳者已譌謬不可考不傳者固宜不能通也今一以𨽻寫之以俟博古者所圖太公伯父盉秦盄和鐘宰辟父敦仲信父圓甗伯勲父方甗各一鐘四皆銘曰走作朕皇祖文考寶和鐘盖成王作以祀文王器也但既曰皇祖而又曰文考所未曉也首載邢州所上瑞鼎制作無法兩旁獸面銜環三足作異獸負立怪而不典不知何從得而名三代器也胡俛古器圖一卷皇祐初仁宗皇帝召宰執觀書太清樓因閱羣國所上三代舊器命摸窽以賜近臣有翰林待詔李唐卿者以𨽻字釋之十得二三翰林學士王原叔又釋之始通八九熈寧戊申嵗司封貟外郎知和州胡俛公謹取所賜器窽五銘鑱石傳世但俛以辟宫敦為鼎以太公簠為斗以仲信父旅甗為煮甗徒刻其文而不載原叔所釋之字為未盡善原叔名洙睢陽人狀元參知政事王堯臣之叔終南京留臺嘗被㫖篆五經刻石於國學云李伯時考古圖五巻李公麟字伯時舒城人也著考古圖每巻毎器各為圖叙其釋制作鏤文窽字義訓及所用復總為前序後賛天下傳之士大夫知留意三代鼎彛之學實始於伯時謂聖人制器尚象載道垂戒寓不傳之妙於器用之間以道後人使宏識之士即器以求象即象以求意心悟目擊命物之智曉禮樂法而不說之秘朝夕鑒觀罔有逸徳此唐虞畫衣冠以為紀而能使民不犯於有司豈徒眩美資玩為恱目之具哉謂彛器窽識真蝌蚪古文實籕學之本源字義之宗祖商周之時器有常工日以鼓鑄為事字有妙意時方書畫未分羊足字畫形以著名壺卣字象形以製字庚則纍然象物秋而垂實癸則包結象草萌而未達明罍所以承尊彛謂觚為用同圭笏發明聖人奥義微㫖於數千百載之後非寡見謏聞音小見禮記之所識知其博學精鑒用意至到聞一器􅂢千金不少靳既得則刮磨探考稽證詩書百氏審諦若符契乃已哲宗皇帝紹聖五年春得玉璽下禮部集諸儒參定公麟時為御史掾獻言秦璽用藍田玉色正青書以龍蚓鳥魚為文者帝王受命之符玉質堅甚非昆吾刀蟾肪不可治自漢琱法中絶此璽真秦李斯所作可考不疑朝廷是公議詔以五月朔御前殿用全仗受焉宰臣百官奉表稱賀肆赦改元以紀國瑞實自伯時發之父虚一喜藏法書名畫伯時自少好之遂悟古人用筆畫特精絶氣韻髙逺意造天成顧陸張吳殆不能過晚作洗玉池東坡居士銘之又刻所得拱寶琥瑞等自作鐘鼎篆窽於池云元祐惟五年庚午正月初吉舒李伯時公麟父曰友善陳散侯恵我泗濵樂石沼敬懷義徳不敢辭乃用琱古寶十有六玉環四周受泉其中命曰洗玉池永嘉明徳恭祈夀康子子孫孫無疆惟休其寶用之無已自號龍眠居士云李伯時周鑒圖一巻伯時元祐辛未歲作首圖琱戈銘云右六字鈿金為文不可識禹以九牧之金鑄鼎垂運巧思以鐫鏤之庾肩吾所謂蚊脚傍低鵠首仰立者正此書也次載商器窽十四多者三十八字少者一兩言䟦云余昔窺古不至石鼔兹因彛器頗迹夏商幸見學者當復博見逺流故刻之秦邸若置尊中衢宜酌取也吕與叔考古圖十卷吕大臨字與叔丞相大防之弟監鳳翔府司竹監東西省從官列薦其行義修飾文辭爾雅除太學博士著考古圖十卷大臨博學無所不通尤深於春秋三禮著裕陵山陵記三卷時服其該贍其辨證字學用意深逺謂宣榭云射字如執弓矢以射之像因名其堂曰射後世加木非也堂無室便於射事故凡無室者皆謂之射宣王之廟制如射故謂之宣射於歴書考證詳而合經與叔叙散季肇敦文曰四年八月初吉丁亥以太初厯推之文王受命歲在庚午九年而終歲在己夘故書曰惟九年大統未集武王以明年改元十三年壬午伐紂實武王即位之四年今敦文曰惟王四年王盖武王也是年一月辛卯書曰惟一月壬辰旁死魄旁死魄者二日也是歲二月後有閏自一月至八月小盡者四八月丁亥朔與書一月壬辰厯合武王時散氏有散宜生季疑其字而獲於乾之永夀永夀在豳岐之間盖周地也辨敦云作皇祖益公文公武伯皇考龔伯鼎謂祭四世必大夫也古者大夫雖三廟而祭必及髙祖故大傳云大夫士千祫及其髙祖武伯龔伯盖祖考之為大夫者益公文公髙曾之為諸侯者大夫而祖諸侯末世之僭禮也伯庶父制器祭其王始譏其不合於禮雁侯作姬邍音原毋敦謂莫曉其義嚴於禮眀於分如此之謹戩敦云正月乙子商彛云丁子與叔謂日辰剛柔不相配疑乙子即甲子丁子即丙子世質人淳取其同類未甚區别不然殆不可攷余謂戩敦正月乙子者正月上子日未立春尚用十二月乙丑節故云乙子丁子豈亦未得春用季冬之丁丑冠正月之子日耶古人嚴時而謹始春秋之書年正次王王次春三代之器必皆紀日者亦是意歟其論爵謂士喪禮虞祭主人洗廢爵廢爵則無足主婦洗足爵足爵則無文足爵圖中所載言父爵是也繶爵則腹有飾矣猶未為純吉之爵圖中所載單爵篆帶爵是也躅尾足腹之間徧飾篆刻則為吉爵圖中所載父丁爵主人舉爵已舉爵之類是也其討論深逺博而合經非寡聞淺學所能窺識釋􅌏敦述天子册命之禮可以想像當時禮儀之大細於牧敦論五冕之制以虎冕則毳冕如荀卿以山冕為龍衮舉一物以名其服尤為贍洽余按周禮灌皆用彛獻皆用尊酢皆用罍六彛有舟舟以戒其覆六尊有罍罍以警其淫六彛鷄鳥斝音稼黄虎蜼蜼本音蛇虺之虺見周禮今音壘非也六尊獻象壺著太山彛必有舟罍必副尊二十四器相須為用盖祼用彛彛言法獻用尊尊言尊酢用罍罍取警也聶氏禮圖所載六彛亦各别有舟如此則舟為别器以承彛明矣諸彛無舟全者惟牧敦兕敦師毁敦三器有舟盖彛之有舟如爵之有坫古人重器未有無藉者三代以彛為上尊又以灌鬯以尊事神必不直置於席而已則所謂舟盖彛之座也周禮司尊彛春祠夏禴祼用鷄彛鳥彛皆有舟秋嘗冬烝祼用斝彛黄彛皆有舟四時之間祀追享朝享祼用虎彛蜼彛皆有舟毎祭所用之彛皆有舟舟六尊有罍罍為别器則六彛有舟舟豈直為彛之足哉余按鄭司農云舟彛下臺若今承盤則牧敦之臺真舟也余非敢鑿空為臆說以欺世盖考之於洛陽安氏所藏牧敦及博古兕敦師毁敦而證之於周禮云仲丁壺窽云用祀用享與叔謂坊記曰敬則用祭器故祀享兼用余謂左氏傳云魯有禘樂賔祭用之况器乎哉惟釋朝事尊窽云後中罇中中者尊在後列而居中為臆鑿云與叔謂卬中饋字音頭酉足而加於皿必周末時器盖字非法度中來余按字書盫於含切與同古書不必同文又今與音聲不逺而盫等為饋食之器與叔之卒也東坡居士作相挽之詩哭之曰言中謀猷行中經闗西人物數清英欲過叔度留終日未識魯山空此生論議凋零三益友功名分付二難兄老來尚有憂時歎此涕無從何處傾先公頃寓霅川葉少藴左丞於湖之卞山建讀書堂山川秀偉自然怪石嵌空砢礧如巖谷間茂林修竹真神仙居也葉一日至城中謁先公伺飯飯已率予棹舟過其居案間偶置與叔考古圖葉指秦盄和鐘謂余此窽讀者殆不能句余為少藴讀之少藴掩卷歎曰公真通古者使伯時與叔在當屈服矣余欲載釋盄和鐘一時張本故併及之然過實之語不敢當也盄和鐘窽有二字合為一字者如小子乃夏四方多宜字是也名有六字作十二字讀者如晳邦其音銑雝是也七字當作八字讀者孔皇以邵孝享是也邵又當讀為昭六字當作八字讀者如以受純魯多釐是也盖銘皆四字為句以器小不能容窽故特為此竒譎合并之文使後之讀者以意求之今具訓于後秦公曰丕顯朕皇祖受天命奄有下國十有二公不墜在上嚴龔寅天命保撫乃秦􅊒許郤切懼也易曰震來􅊒􅊒事蠻夏曰余雖小子穆穆師秉明徳睿敷明刑䖍敬朕祀以受多福協和萬民唬音呼夙夕刺刺􅧱􅧱音爰萬生是敇咸畜百辟匡士文武音古㢠切明也静不庭乃夏爕百邦于秦執享作盄音諸姚切和鐘乃銘曰晳邦其音其音銑銑銑銑雝雝孔皇以邵昭格孝享以受純魯純魯多釐眉夀無疆畯恵在位髙𢎞有慶敷祐四方永保多宜唬呼交反又古伯反􅧱禹煩反玉篇作䞩疑盍合通用烏合反跛也又胡甲反劉原父先秦古器圖碑一卷諱敞吉州人字原父自叙其略云先秦古器十有一物制作精巧有窽識皆科斗書為古學者莫能盡通以他書參之十得五六就其可知者較其世或出周文武時於今盖二千有餘歲矣嗟乎三王之事萬不存一詩書所紀聖賢所立有可長太息者獨器也乎哉敞判考功仁宗賜宰相夏竦諡曰文正敞言諡者有司之事竦行邪而陛下諡之以正不應法且侵臣官疏三上仁宗為更諡曰文莊張貴妃追號温成皇后有請立忌者敞言太祖以來后廟四室陛下之妣也猶不立忌豈可以私愛而越禮乎奉使契丹順州有異獸如馬而食虎豹遼不知名以問敞敞曰此所謂駮也為言其狀遼人服其博翟耆年曰司馬相如子虗賦載楚王駕馴駮之駟乗彫玉之輿張揖曰駮如馬白身黒尾一角銛牙食虎豹乃此也敞自六經諸子百氏下傳記小說無不通貫在西掖時一日追封皇子公主九人敞將下直立馬九制即就初原甫得上雒鼎以遺歐公歐公云君謨謂十有四月者何原甫不能對也余按商己酉尊云十九月見癸酉卣云十九月南宫鼎云十有三月周牧敦云惟王十年十有四月既生霸上雒鼎云十有四月古者嗣君繼世踰年行即位之禮然後改元今曰十有三月十有四月十有九月者疑嗣王繼世雖踰年未及改元但以月數也惟文姬鼎云十一月又二者莫可曉一而又三豈亦十四月乎敞與弟攽字貢父子奉世字仲馮著漢書刋誤多所糾正原父又著春秋傳權衡說例意林合四十一卷又作詩書三禮論語公羊解名曰七經小傳其論毛詩變風變雅謂諸國言正義善事合於道者皆正風也譏刺怨諷者皆變風也謂小雅自有正雅大雅自有變雅極有理辨尚書正九共九篇為九丘九篇共當作丘古文丘字作丠丠與共相近誤傳丠為共九丠九篇言九州之書凡九篇楚左史倚相能讀三墳五典八索九丘之書者盖此也禹貢載九州之地形乃治水之書所言者形質也九丘之書者殊土異俗各因其性而教擾之所言者情性也周禮大宰九兩繫邦國之民三曰師以賢得民師之得民與人君等四曰儒以道得民儒之得民與人君等八曰友以任得民友之得民與師儒等以賢以道以任使各率五教以正民性導之督禮以事其上使君得民之心而成王事也解立其監為建冢嗣以監國非粹於經者其能此乎凡樂九變八變以一終為一變加田無征引國語官宰食征不食於國古者家臣之征入於家陪臣之征入於國諸侯之征入於王大夫之田為圭田自受而不征所以厚賢也今採其尤者著之以見敞自得之學如此周秦古器銘碑一巻釋云咸平三年五月同州民湯善徳於河瀆獲方甗一上有十二字九月好畤令黄傳鄆獲方甗一銘二十一字請闗以獻詔示直昭文館勾中正秘門校理杜鎬中正識其刻書以𨽻古字訓之少者八字多者七十餘字末云丁巳年癸卯月乙酉日僧湛洤立按丁巳則天禧元年乙酉二月初三日也米氏元章訓古一卷元章以鍾鼎字篆章聖皇帝御製夫子賛尚書周官篇結布簡野悟三代科斗書法之祕紹興皇帝生悟道真多能天縱奎畫遒美追跡鍾王行筆雄偉下視唐晉酷好芾書及芾所臨六朝唐人名跡謂遒麗勁逸足以追繼晉賢行筆非唐人所能及命裒芾書為法帖十巻勒石摹賜近輔聖心留神書學雖穆帝之好逸少書殆不能過臣耆年甞見芾所題甘露寺多景樓詩戲䟦云米南宫書超逸絶塵氣凌宇宙如讀李太白司馬犬子詞章使人飄然有凌雲之意其訓古達昔人㑹意之㫖謂烈士之容懷字衣中容衆有懷之義字相戾大夫志不雷同也稽從卜口謀于衆之義也秬鬯一卣合為一析為四言眉間有毫夀者之證故眉從闕音毫如眉之垂辨說有理實為前人所未到也趙明誠古器物銘碑十五卷商器三卷周器十卷秦漢器二卷河間劉跂序洛陽王夀卿篆夀卿得二李用筆意字畫端勁未易及明誠字徳夫大丞相挺之季子讀書贍博藏書萬巻悉親是正鈆槧未嘗去手酷好書畫遇名跡捐千金不少靳蓄三代鼎彛甚富建炎南渡悉為盜敓所存者九牛之一毛又無子能保其遺餘每為之歎息也晏氏鼎彛譜一卷名溥字慧開丞相元獻公之孫叔原之子豪傑不羈之士也好古文䆳於籕學作晏氏鼎彛譜一卷載所親見三代鼎彛及器窽靖康初官河北金人犯順散家財募兵扞禦與妻玉牒趙氏戎服率義士力戰而死溥於余為姻家最相厚善云籀史
